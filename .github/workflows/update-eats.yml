name: "[hermes] eats (google places)"

on:
  schedule:
    # Weekly — Monday 6 AM ET = 10:00 UTC. Ratings/hours/photos don't change fast,
    # so once a week keeps cost basically zero while staying fresh.
    - cron: "0 10 * * 1"
  workflow_dispatch:        # lets you run it on demand from the Actions tab

concurrency:
  group: eats
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r scripts/requirements.txt
      - run: python scripts/update_eats.py
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
      - name: Commit & push if changed
        run: |
          git config user.name "hermes-bot"
          git config user.email "hermes-bot@users.noreply.github.com"
          git add data/eats.json data/eats-photos
          if git diff --cached --quiet; then
            echo "no changes"
            exit 0
          fi
          git commit -m "[hermes] eats.json google places refresh $(date -u +%F-%H%M)"
          # main is busy (other hermes jobs push every few minutes), so a plain push
          # can lose the race with "fetch first". Rebase onto latest main and retry.
          for i in 1 2 3 4 5; do
            if git push; then
              echo "pushed on attempt $i"
              exit 0
            fi
            echo "push rejected (attempt $i) — rebasing onto origin/main"
            git pull --rebase --autostash origin main || exit 1
            sleep $((i * 3))
          done
          echo "push still failing after 5 attempts" >&2
          exit 1
