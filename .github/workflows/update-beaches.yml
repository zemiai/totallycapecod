name: "[hermes] beaches"

on:
  schedule:
    # Every 20 min, May-October only (Cape's tourist season).
    - cron: "*/20 * * 5,6,7,8,9,10 *"
  workflow_dispatch:

concurrency:
  group: beaches
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r scripts/requirements.txt
      - run: python scripts/update_beaches.py
      - name: Commit & push if changed
        run: |
          git config user.name "hermes-bot"
          git config user.email "hermes-bot@users.noreply.github.com"
          git add data/beaches.json
          if git diff --cached --quiet; then
            echo "no changes"
            exit 0
          fi
          git commit -m "[hermes] beaches.json update $(date -u +%F-%H%M)"
          git push
