name: "[hermes] today"

on:
  schedule:
    # 5:30 AM ET = 09:30 UTC + 11 AM ET = 15:00 UTC
    - cron: "30 9 * * *"
    - cron: "0 15 * * *"
  workflow_dispatch:

concurrency:
  group: today
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r scripts/requirements.txt
      - run: python scripts/update_today.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Commit & push if changed
        run: |
          git config user.name "hermes-bot"
          git config user.email "hermes-bot@users.noreply.github.com"
          git add data/today.json
          if git diff --cached --quiet; then
            echo "no changes"
            exit 0
          fi
          git commit -m "[hermes] today.json update $(date -u +%F-%H%M)"
          # main is busy (other hermes jobs push every few minutes), so a plain push
          # can lose the race with "fetch first". Rebase onto latest main and retry.
          for i in 1 2 3 4 5; do
            if git push; then
              echo "pushed on attempt $i"
              exit 0
            fi
            echo "push rejected (attempt $i) — rebasing onto origin/main"
            git pull --rebase --autostash origin main || exit 1
            sleep $((i * 3))
          done
          echo "push still failing after 5 attempts" >&2
          exit 1
