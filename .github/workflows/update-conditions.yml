name: "[hermes] conditions"

on:
  schedule:
    # 4 AM ET = 08:00 UTC (EDT) / 09:00 UTC (EST). Run at both; the second is a no-op if cached.
    - cron: "0 8 * * *"
  workflow_dispatch:

concurrency:
  group: conditions
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r scripts/requirements.txt
      - run: python scripts/update_conditions.py
      - name: Commit & push if changed
        run: |
          git config user.name "hermes-bot"
          git config user.email "hermes-bot@users.noreply.github.com"
          git add data/conditions.json
          if git diff --cached --quiet; then
            echo "no changes"
            exit 0
          fi
          git commit -m "[hermes] conditions.json update $(date -u +%F-%H%M)"
          git push
