name: "generate lighthouse audio"

# Run manually (Actions tab → this workflow → "Run workflow"). One-time / on-demand.
# Requires repo secret ELEVENLABS_API_KEY. Optional repo variable ELEVENLABS_VOICE_ID.
on:
  workflow_dispatch:
    inputs:
      force:
        description: "Regenerate ALL (type 1) or only missing (leave blank)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r scripts/requirements.txt
      - run: python scripts/gen_lighthouse_audio.py
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ vars.ELEVENLABS_VOICE_ID }}
          ELEVENLABS_MODEL: ${{ vars.ELEVENLABS_MODEL }}
          FORCE: ${{ github.event.inputs.force }}
      - name: Commit generated audio
        run: |
          git config user.name "hermes-bot"
          git config user.email "hermes-bot@users.noreply.github.com"
          git add audio/lighthouses data/lighthouses.json
          if git diff --cached --quiet; then
            echo "no changes"
            exit 0
          fi
          git commit -m "[audio] lighthouse narration via ElevenLabs"
          for i in 1 2 3 4 5; do
            if git push; then exit 0; fi
            git pull --rebase --autostash origin main || exit 1
            sleep $((i * 3))
          done
          exit 1
