name: "[hermes] events"

on:
  schedule:
    # 5:30 AM ET = 09:30 UTC  +  noon ET = 16:00 UTC
    - cron: "30 9 * * *"
    - cron: "0 16 * * *"
  workflow_dispatch:

concurrency:
  group: events
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r scripts/requirements.txt
      - run: python scripts/update_events.py
      - name: Commit & push if changed
        run: |
          git config user.name "hermes-bot"
          git config user.email "hermes-bot@users.noreply.github.com"
          git add data/events.json
          if git diff --cached --quiet; then
            echo "no changes"
            exit 0
          fi
          git commit -m "[hermes] events.json update $(date -u +%F-%H%M)"
          git push
