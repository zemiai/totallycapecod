# Netlify build configuration — locked in via file so UI changes can't break it.
#
# This is a static site (no build step) with two serverless functions:
#   - netlify/functions/email-capture.js   (newsletter signup → Netlify Blobs)
#   - netlify/functions/sponsored-submit.js (paid business listings → Netlify Blobs)
#
# package.json at the repo root declares @netlify/blobs so the functions bundle correctly.

[build]
  publish = "."
  # Skip the Netlify build when a commit ONLY touches data/*.json.
  # Hermes cron jobs push ~100 data updates/day; the app now fetches data
  # directly from GitHub raw, so we don't need a redeploy for those.
  # Exit 0 = skip build. Exit non-zero = run build.
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- . ':(exclude)data/'"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Reliable trigger for the beach water-temp pipeline. GitHub throttles its own
# schedule: cron, so this dispatches update-beaches.yml every 30 min. The
# function self-limits to May–Oct and no-ops if GH_DISPATCH_TOKEN isn't set.
[functions."trigger-beaches"]
  schedule = "*/30 * * * *"

# Long-cache for the heavy assets, short-cache for HTML + JSON so updates appear fast.
[[headers]]
  for = "/data/*.json"
  [headers.values]
    Cache-Control = "public, max-age=60, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"
